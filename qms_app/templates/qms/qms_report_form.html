{% extends 'qms/base.html' %}

{% block content %}
<!-- Include Bootstrap & Flatpickr CSS -->

{% comment %} <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"> {% endcomment %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Generate QMS Analytical Report</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{% url 'qms_report_generate' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Select Date Range (From - To)</label>
                    <input type="text" name="date_range" id="date_range" class="form-control" placeholder="Select Range.." readonly>
                </div>
                <!-- The No Overdue Toggle -->
                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" name="no_overdue" id="noOverdue">
                    <label class="form-check-label" for="noOverdue">
                        <strong>Exclude Overdue records from Analytics</strong> (Sections 1, 3, & 4)
                    </label>
                </div>
                <button type="submit" class="btn btn-success">Download Professional PDF Report</button>
            </form>
        </div>
    </div>
</div>

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    flatpickr("#date_range", {
        mode: "range",
        dateFormat: "Y-m-d",
        altInput: true,
        altFormat: "F j, Y",
    });
</script>
{% endblock %}
