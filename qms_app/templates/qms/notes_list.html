{% extends 'qms/base.html' %}

{% block content %}
<h1 class="mb-4">My Notes</h1>
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h3>Create Note</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Save Note</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <h3>Existing Notes</h3>
        <ul class="list-group">
            {% for note in notes %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        {{ note.description }}
                        <br>
                        <small class="text-muted">Target: {{ note.target_date|default:"N/A" }}</small>
                    </div>
                    <div>
                        <a href="{% url 'note_edit' note.pk %}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil-square"></i></a>
                        <a href="{% url 'note_delete' note.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                    </div>
                </li>
            {% empty %}
                <li class="list-group-item">No notes yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
